<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
    
</head>
<body>
    <h2>My Tasks</h2>
    <div id="task-pending" class="task pending">
        <h3>Learn JavaScript Basics</h3>
        <p>Complete variables and functions exercises</p>
        <p>Status: <span class="status">⏳ Pending</span></p>
        <button class="toggle-btn">Toggle Status</button>
        <button class="remove-btn">Remove</button>
    </div>
    <div id="task-completed" class="task completed">
        <h3>Build a Simple Website</h3>
        <p>Create HTML structure and basic CSS styling</p>
        <p>Status: <span class="status">✅ Completed</span></p>
        <button class="toggle-btn">Toggle Status</button>
        <button class="remove-btn">Remove</button>
    </div>

    <script src="main.js"></script>
</body>
</html>
